<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versa | Dashboard da Coordenação</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="coordenacao.css">
    <style>
        .resumo-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:16px; margin-bottom:20px; }
        .resumo-card, .ativos-card, .filtros-card { background:#01aaa3; color:#fff; padding:18px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,.05); }
        .resumo-card strong { display:block; font-size:2rem; margin-top:6px; }
        .filtros-card { margin-bottom:20px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        .filtros-card select { padding:10px 12px; border-radius:8px; border:none; min-width:240px; }
        .ativos-lista { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:12px; }
        .ativo-item { background: rgba(255,255,255,.12); border-radius:10px; padding:12px; }
        .ativo-item b { display:block; font-size:1rem; margin-bottom:6px; }
        .ativo-item small { display:block; opacity:.95; margin-top:2px; }
        .bloco-grafico-titulo { color:#fff; font-weight:700; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Dashboard Analítico</h1>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="exportarCSV()">📥 EXPORTAR CSV</button>
            <a href="/cadastro-monitor.html" class="btn btn-primary">+ GERIR MONITORES</a>
        </div>
    </div>

    <div class="resumo-grid">
        <div class="resumo-card">
            <span>Atendimentos do dia</span>
            <strong id="total-dia">0</strong>
        </div>
        <div class="resumo-card">
            <span>Monitorias ativas</span>
            <strong id="monitorias-ativas-total">0</strong>
        </div>
    </div>

    <div class="filtros-card">
        <span style="font-weight:700;">Filtrar matéria:</span>
        <select id="filtro-materia-coord" onchange="aplicarFiltros()">
            <option value="__todas__">Todas as matérias</option>
        </select>
    </div>

    <div class="ativos-card" style="margin-bottom:20px;">
        <div class="bloco-grafico-titulo">Monitorias ativas</div>
        <div id="lista-monitorias-ativas" class="ativos-lista"></div>
    </div>

    <div class="charts-grid">
        <div class="chart-container">
            <div class="bloco-grafico-titulo">Atendimentos por matéria</div>
            <canvas id="chartMaterias"></canvas>
        </div>
        <div class="chart-container">
            <div class="bloco-grafico-titulo">Frentes por matéria</div>
            <canvas id="chartFrentes"></canvas>
        </div>
        <div class="chart-container">
            <div class="bloco-grafico-titulo">Atendimentos por monitor</div>
            <canvas id="chartMonitores"></canvas>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Turma</th>
                    <th>Matéria</th>
                    <th>Módulos</th>
                    <th>Monitor</th>
                    <th>Avaliação</th>
                    <th>Início</th>
                    <th>Duração</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const institutionId = params.get('institution') || localStorage.getItem('institution_id') || null;
        const monitorId = params.get('monitor') || localStorage.getItem('monitor_id') || null;
        const monitoriaId = params.get('monitoria') || localStorage.getItem('monitoria_id') || null;
        const role = localStorage.getItem('user_role') || 'MONITOR';
        const API_BASE = window.location.origin;

        const socket = io(API_BASE, {
            transports: ['websocket'],
            withCredentials: true,
            auth: {
                institutionId,
                userId: monitorId,
                role,
                monitoriaId
            }
        });
        let chartMaterias, chartFrentes, chartMonitores;
        let ultimoHistorico = [];
        let ultimoDados = {};

        Chart.defaults.color = '#ffffff';
        Chart.defaults.borderColor = '#ffffff';

        function hojeLocalISO() {
            const agora = new Date();
            const y = agora.getFullYear();
            const m = String(agora.getMonth() + 1).padStart(2, '0');
            const d = String(agora.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function inicializarGraficos() {
            chartMaterias = new Chart(document.getElementById('chartMaterias').getContext('2d'), {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Atendimentos', data: [], backgroundColor: '#6035a9' }] },
                options: {
                    scales: {
                        x: {
                            ticks: {
                                font: { size: 11 },
                                maxRotation: 0,
                                minRotation: 0,
                                callback: function(value) {
                                    const label = this.getLabelForValue(value);

                                    const palavras = label.split(' ');
                                    const linhas = [];
                                    let linhaAtual = '';

                                    palavras.forEach(palavra => {
                                    if ((linhaAtual + palavra).length > 12) {
                                        linhas.push(linhaAtual.trim());
                                        linhaAtual = palavra + ' ';
                                    } else {
                                        linhaAtual += palavra + ' ';
                                    }
                                    });

                                    if (linhaAtual) linhas.push(linhaAtual.trim());

                                    return linhas;
                                }
                            }
                        }
                    }
                }
            });
            chartFrentes = new Chart(document.getElementById('chartFrentes').getContext('2d'), {
                type: 'bar',
                data: { labels: ['Frente A', 'Frente B', 'Frente C'], datasets: [{ label: 'Módulos', data: [0, 0, 0], backgroundColor: ['#64e2e0', '#c19eeb', '#fadf89'] }] },
                options: {
                    scales: {
                        x: {
                            ticks: {
                                font: { size: 11 },
                                maxRotation: 0,
                                minRotation: 0,
                                callback: function(value) {
                                    const label = this.getLabelForValue(value);

                                    const palavras = label.split(' ');
                                    const linhas = [];
                                    let linhaAtual = '';

                                    palavras.forEach(palavra => {
                                    if ((linhaAtual + palavra).length > 12) {
                                        linhas.push(linhaAtual.trim());
                                        linhaAtual = palavra + ' ';
                                    } else {
                                        linhaAtual += palavra + ' ';
                                    }
                                    });

                                    if (linhaAtual) linhas.push(linhaAtual.trim());

                                    return linhas;
                                }
                            }
                        }
                    }
                }
            });

            chartMonitores = new Chart(document.getElementById('chartMonitores').getContext('2d'), {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Atendimentos por monitor', data: [], backgroundColor: '#6035a9' }] },
                options: {
                    scales: {
                        x: {
                            ticks: {
                                font: { size: 11 },
                                maxRotation: 0,
                                minRotation: 0,
                                callback: function(value) {
                                    const label = this.getLabelForValue(value);

                                    const palavras = label.split(' ');
                                    const linhas = [];
                                    let linhaAtual = '';

                                    palavras.forEach(palavra => {
                                    if ((linhaAtual + palavra).length > 12) {
                                        linhas.push(linhaAtual.trim());
                                        linhaAtual = palavra + ' ';
                                    } else {
                                        linhaAtual += palavra + ' ';
                                    }
                                    });

                                    if (linhaAtual) linhas.push(linhaAtual.trim());

                                    return linhas;
                                }
                            }
                        }
                    }
                }
            });
        }

        function preencherFiltroMaterias(historico, dados) {
            const select = document.getElementById('filtro-materia-coord');
            const atual = select.value || '__todas__';
            const materias = new Set();

            historico.forEach(h => { if (h.materia) materias.add(h.materia); });
            Object.values(dados || {}).forEach(monitor => (monitor.materias || []).forEach(mat => materias.add(mat)));

            select.innerHTML = '<option value="__todas__">Todas as matérias</option>';
            [...materias].sort().forEach(materia => {
                const option = document.createElement('option');
                option.value = materia;
                option.textContent = materia;
                select.appendChild(option);
            });
            select.value = [...select.options].some(o => o.value === atual) ? atual : '__todas__';
        }

        function getHistoricoFiltrado() {
            const filtro = document.getElementById('filtro-materia-coord').value;
            return filtro === '__todas__' ? ultimoHistorico : ultimoHistorico.filter(h => h.materia === filtro);
        }

        function aplicarFiltros() {
            const historicoFiltrado = getHistoricoFiltrado();
            atualizarTabela(historicoFiltrado);
            atualizarGraficos(historicoFiltrado);
            atualizarResumo(ultimoHistorico, ultimoDados);
            renderMonitoriasAtivas(ultimoDados);
        }

        function atualizarResumo(historico, dados) {
            const hoje = hojeLocalISO();
            const atendimentosHoje = historico.filter(h => h.fim && new Date(h.fim).toISOString().slice(0, 10) === hoje).length;
            const monitoriasAtivas = Object.values(dados || {}).filter(m => m.status !== 'em pausa' || m.atual || (m.fila || []).length).length;
            document.getElementById('total-dia').innerText = atendimentosHoje;
            document.getElementById('monitorias-ativas-total').innerText = monitoriasAtivas;
        }

        function renderMonitoriasAtivas(dados) {
            const filtro = document.getElementById('filtro-materia-coord').value;
            const container = document.getElementById('lista-monitorias-ativas');
            const ativos = Object.values(dados || {}).filter(info => {
                const materias = info.materias || [];
                const passaMateria = filtro === '__todas__' || materias.includes(filtro) || (info.atual && info.atual.materia === filtro) || (info.fila || []).some(a => a.materia === filtro);
                return passaMateria && (info.atual || (info.fila || []).length || info.status === 'disponível');
            });

            if (!ativos.length) {
                container.innerHTML = '<div class="ativo-item"><b>Nenhuma monitoria ativa</b><small>Sem registros para o filtro selecionado.</small></div>';
                return;
            }

            container.innerHTML = ativos.map(info => {
                const atual = info.atual ? `${info.atual.nome} (${info.atual.status === 'chamado' ? 'chamado' : 'em atendimento'})` : 'Sem atendimento em andamento';
                return `
                    <div class="ativo-item">
                        <b>${info.nome || 'Monitor'}</b>
                        <small>Matérias: ${(info.materias || []).join(', ') || '---'}</small>
                        <small>Status: ${info.status || 'disponível'}</small>
                        <small>Fila: ${(info.fila || []).length}</small>
                        <small>Atual: ${atual}</small>
                    </div>`;
            }).join('');
        }

        function atualizarTabela(historico) {
            const tbody = document.getElementById('tabela-corpo');

            tbody.innerHTML = (historico || []).map(h => {

                const modulosHTML = Array.isArray(h.modulos) && h.modulos.length
                    ? `<div class="modulos-flex">${h.modulos.map(m => `<span class="badge-modulo">${m}</span>`).join('')}</div>`
                    : '---';

                const dataInicio = h.inicio ? new Date(h.inicio) : null;
                const horaInicio = dataInicio && !isNaN(dataInicio)
                    ? dataInicio.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                    : '---';

                const duracaoFormatada = h.duracao != null
                    ? `${h.duracao} min`
                    : '---';

                const estrelas = typeof h.nota === 'number'
                    ? '⭐'.repeat(h.nota)
                    : '---';

                return `
                    <tr>
                        <td style="color: #ffffff; font-size: 0.8rem;">${h.nome || 'Aluno'}</td>
                        <td style="color: #ffffff; font-size: 0.8rem;">${h.turma || '---'}</td>
                        <td><span class="badge-modulo">${h.materia || '---'}</span></td>
                        <td>${modulosHTML}</td>
                        <td><span class="badge-modulo">${h.atendidoPor || '---'}</span></td>
                        <td>${estrelas}</td>
                        <td style="color: #ffffff; font-size: 0.8rem;">${horaInicio}</td>
                        <td style="color: #ffffff; font-size: 0.8rem;">${duracaoFormatada}</td>
                    </tr>
                `;
            }).join('');
        }

        function atualizarGraficos(historico) {
            const contagemMaterias = {};
            const contagemFrentes = { A: 0, B: 0, C: 0 };
            const contagemMonitores = {};

            historico.forEach(h => {
                const materia = h.materia || 'Sem matéria';
                contagemMaterias[materia] = (contagemMaterias[materia] || 0) + 1;

                const listaModulos = Array.isArray(h.modulos) ? h.modulos : (h.modulo ? [h.modulo] : []);
                listaModulos.forEach(mod => {
                    const frente = String(mod).trim().charAt(0).toUpperCase();
                    if (contagemFrentes[frente] !== undefined) contagemFrentes[frente]++;
                });

                const monitor = h.atendidoPor || 'Sem monitor';
                contagemMonitores[monitor] = (contagemMonitores[monitor] || 0) + 1;
            });

            chartMaterias.data.labels = Object.keys(contagemMaterias);
            chartMaterias.data.datasets[0].data = Object.values(contagemMaterias);
            chartMaterias.update();

            chartFrentes.data.datasets[0].data = [contagemFrentes.A, contagemFrentes.B, contagemFrentes.C];
            chartFrentes.update();

            chartMonitores.data.labels = Object.keys(contagemMonitores);
            chartMonitores.data.datasets[0].data = Object.values(contagemMonitores);
            chartMonitores.update();
        }

        function exportarCSV() {
            window.location.href = '/exportar-csv';
        }

        
        function normalizarEstadoServidor(payload) {
            const base = payload || {};
            const monitores = Array.isArray(base.monitores) ? base.monitores : [];
            const fila = Array.isArray(base.fila) ? base.fila : [];
            const dados = {};

            monitores.forEach((monitor) => {
                const monitoriaAtualId = monitor?.sessaoAtiva?.monitoriaId || null;
                const filaMonitoria = monitoriaAtualId
                    ? fila.filter(item => item.monitoriaId === monitoriaAtualId)
                    : [];
                const atualBruto = filaMonitoria.find(item => item.status === 'IN_SERVICE')
                    || filaMonitoria.find(item => item.status === 'CALLED')
                    || null;
                const filaEspera = filaMonitoria.filter(item => item.status === 'WAITING');
                const tituloMonitoria = filaMonitoria.find(item => item?.monitoria?.title)?.monitoria?.title || 'Monitoria';

                dados[monitor.id] = {
                    id: monitor.id,
                    nome: monitor.name || 'Monitor',
                    materias: Array.isArray(monitor?.subjects)
                        ? monitor.subjects.map(s => s?.name).filter(Boolean)
                        : [tituloMonitoria],
                    status: monitor.isOnline
                        ? (monitor.isPaused ? 'em pausa' : 'disponível')
                        : 'offline',
                    fila: filaEspera.map(item => ({
                        id: item.id,
                        nome: item?.student?.name || 'Aluno',
                        telefone: item?.student?.id || '',
                        materia: item?.monitoria?.title || tituloMonitoria,
                        modulos: item?.module
                            ? [[item.module.code, item.module.title].filter(Boolean).join(' - ')]
                            : [],
                        inicioFila: item?.createdAt ? new Date(item.createdAt).getTime() : null
                    })),
                    atual: atualBruto ? {
                        id: atualBruto.id,
                        nome: atualBruto?.student?.name || 'Aluno',
                        telefone: atualBruto?.student?.id || '',
                        materia: atualBruto?.monitoria?.title || tituloMonitoria,
                        modulos: [],
                        status: atualBruto.status === 'IN_SERVICE' ? 'em_atendimento' : 'chamado',
                        chegadaLimiteEm: atualBruto.calledAt ? new Date(atualBruto.calledAt).getTime() + 2 * 60 * 1000 : null,
                        atendimentoInicioEm: atualBruto.startedAt ? new Date(atualBruto.startedAt).getTime() : null,
                        atendimentoLimiteEm: atualBruto.startedAt ? new Date(atualBruto.startedAt).getTime() + 15 * 60 * 1000 : null,
                        extraLiberado: false
                    } : null,
                    sessaoAtiva: monitor.sessaoAtiva || null
                };
            });

            return {
                dados,
                historico: Array.isArray(base.historico) ? base.historico : [],
                serverTime: Date.now(),
                config: {
                    tempoChegadaMs: 2 * 60 * 1000,
                    tempoAtendimentoMs: 15 * 60 * 1000,
                    tempoExtraMs: 5 * 60 * 1000
                }
            };
        }


        socket.on('dados-iniciais', (payload) => {
            const data = normalizarEstadoServidor(payload);
            ultimoHistorico = data.historico || [];
            ultimoDados = data.dados || {};
            if (!chartMaterias || !chartFrentes || !chartMonitores) inicializarGraficos();
            preencherFiltroMaterias(ultimoHistorico, ultimoDados);
            aplicarFiltros();
        });
    </script>
</body>
</html>
