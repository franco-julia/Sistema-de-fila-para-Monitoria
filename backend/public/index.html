<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versa Monitoria | Aluno</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>VERSA MONITORIA</h1>

    <div class="monitoria-grid" id="grid-monitorias"></div>

    <div class="overlay" id="overlay-registro">
        <div class="modal">
            <button class="close-btn" onclick="fecharRegistro()">×</button>
            <div style="text-align: left; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
                <span id="reg-monitor-nome" class="monitor-nome-modal">Monitor</span>
                <span id="reg-materia-nome" class="materia-subtitulo-modal">Selecione a matéria</span>
            </div>

            <label for="tel-aluno">WhatsApp</label>
            <input type="tel" id="tel-aluno" placeholder="(00) 00000-0000">

            <label id="label-materia" for="select-materia">Escolha a matéria</label>
            <select id="select-materia" onchange="selecionarMateriaAluno(this.value)">
                <option value="">Selecione a matéria...</option>
            </select>

            <label for="select-modulos">Escolha o módulo</label>
            <div id="tags-container" class="tags-selecionadas"></div>
            <select id="select-modulos" onchange="selecionarModulo(this.value)" disabled>
                <option value="">Selecione um módulo...</option>
            </select>

            <button class="btn-confirm" onclick="confirmarEntrada()">ENTRAR NA FILA AGORA</button>
        </div>
    </div>

    <div class="overlay" id="overlay-espera" style="display:none;">
        <div class="modal" id="painel-espera" style="display:block; text-align:center;">
            <div style="margin-bottom: 25px;">
                <span id="view-monitor-wait" class="monitor-nome-espera">Monitor</span>
                <span id="view-materia-wait" class="materia-subtitulo-espera">Disciplina</span>
            </div>

            <div class="stat-label">Sua posição atual</div>
            <div class="posicao-v" id="view-posicao">--</div>
            <p id="view-status-msg" style="font-weight:600;"></p>

            <div class="cronometros-espera">
                <div class="cronometro-box" id="box-espera">
                    <span class="cronometro-label">Tempo de espera</span>
                    <span class="cronometro-valor" id="view-tempo-espera">00:00</span>
                </div>
                <div class="cronometro-box destaque" id="box-chegada" style="display:none;">
                    <span class="cronometro-label">Tempo para chegar</span>
                    <span class="cronometro-valor" id="view-chegada-countdown">02:00</span>
                </div>
                <div class="cronometro-box" id="box-atendimento" style="display:none;">
                    <span class="cronometro-label">Tempo de atendimento</span>
                    <span class="cronometro-valor" id="view-atendimento-tempo">00:00</span>
                </div>
            </div>

            <div id="view-modulos-list" style="font-size: 0.85rem; color: var(--text-main); background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px;">
                Nenhum módulo selecionado.
            </div>

            <button onclick="desistirFila()" class="btn-cancelar">Sair da Fila</button>
        </div>
    </div>

    <div class="overlay" id="overlay-feedback" style="display:none;">
        <div class="modal" style="text-align:center;">
            <h2 style="color: var(--accent); margin-bottom: 5px;">Atendimento Finalizado!</h2>
            <p style="color: #ffffff; font-size: 0.9rem; margin-bottom: 20px;">Como foi sua experiência?</p>

            <div class="nota-escala">
                <button onclick="selecionarNota(1, this)" class="btn-nota n1">1</button>
                <button onclick="selecionarNota(2, this)" class="btn-nota n2">2</button>
                <button onclick="selecionarNota(3, this)" class="btn-nota n3">3</button>
                <button onclick="selecionarNota(4, this)" class="btn-nota n4">4</button>
                <button onclick="selecionarNota(5, this)" class="btn-nota n5">5</button>
            </div>

            <textarea id="comentario-feedback" placeholder="Escreva um comentário opcional..."></textarea>
            <button class="btn-confirm" style="margin-top:20px;" onclick="enviarFB()">ENVIAR AVALIAÇÃO</button>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const params = new URLSearchParams(window.location.search);

        let institutionId = params.get('institution') || localStorage.getItem('institution_id') || '';
        if (params.get('institution')) localStorage.setItem('institution_id', params.get('institution'));

        if (!institutionId) {
            alert('institutionId não encontrado. Abra a página com ?institution=SEU_ID');
        }

        const socket = io(API_BASE, {
            transports: ['websocket'],
            withCredentials: true,
            auth: {
                institutionId,
                role: 'STUDENT'
            }
        });

        let notaGlobal = 0;
        let ultimoEstadoGeral = { monitores: [], fila: [] };
        let serverOffsetMs = 0;
        let selectedMonitor = null;
        let monitorSelecionadoUsuario = null;
        let selectedSubject = null;
        let selectedModules = [];
        let availableSubjects = [];
        let selectedEntryId = null;
        let feedbackEntryId = null;
        let studentId = localStorage.getItem('student_id') || '';
        let cancelamentoEmAndamento = false;
        const monitoriaTitulos = new Map();
        

        const subjectSelect = document.getElementById('select-materia');
        const moduleSelect = document.getElementById('select-modulos');
        const tagsContainer = document.getElementById('tags-container');

        function atualizarOffsetServidor(serverTime) {
            if (typeof serverTime === 'number') {
                serverOffsetMs = Date.now() - serverTime;
            }
        }

        function agoraServidor() {
            return Date.now() - serverOffsetMs;
        }

        function formatarHHMMSS(ms) {
            const totalSeg = Math.max(0, Math.floor(ms / 1000));
            const horas = Math.floor(totalSeg / 3600).toString().padStart(2, '0');
            const min = Math.floor((totalSeg % 3600) / 60).toString().padStart(2, '0');
            const seg = (totalSeg % 60).toString().padStart(2, '0');
            return `${horas}:${min}:${seg}`;
        }

        function formatarMMSS(ms) {
            const totalSeg = Math.max(0, Math.floor(ms / 1000));
            const min = Math.floor(totalSeg / 60).toString().padStart(2, '0');
            const seg = (totalSeg % 60).toString().padStart(2, '0');
            return `${min}:${seg}`;
        }

        function formatarTelefone(valor) {
            const digits = String(valor || '').replace(/\D/g, '').slice(0, 11);
            if (digits.length <= 10) {
                return digits.replace(/(\d{2})(\d{4})(\d{0,4})/, (_, a, b, c) => c ? `(${a}) ${b}-${c}` : `(${a}) ${b}`);
            }
            return digits.replace(/(\d{2})(\d{5})(\d{0,4})/, (_, a, b, c) => c ? `(${a}) ${b}-${c}` : `(${a}) ${b}`);
        }

        document.getElementById('tel-aluno').addEventListener('input', (e) => {
            e.target.value = formatarTelefone(e.target.value);
        });

        async function carregarMaterias() {
            try {
                const resp = await fetch(`${API_BASE}/subjects`);
                const data = await resp.json();
                if (!resp.ok || !data.ok) {
                    throw new Error(data.message || 'Erro ao buscar matérias.');
                }

                availableSubjects = Array.isArray(data.subjects) ? data.subjects : [];
                subjectSelect.innerHTML = '<option value="">Selecione a matéria...</option>';

                for (const subject of availableSubjects) {
                    const option = document.createElement('option');
                    option.value = subject.id;
                    option.textContent = subject.name;
                    subjectSelect.appendChild(option);
                }
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        }

        async function carregarModulos(subjectId) {
            selectedModules = [];
            tagsContainer.innerHTML = '';
            moduleSelect.innerHTML = '<option value="">Selecione um módulo...</option>';
            moduleSelect.disabled = true;

            if (!subjectId) return;

            try {
                const resp = await fetch(`${API_BASE}/subjects/${subjectId}/modules`);
                const data = await resp.json();

                if (!resp.ok || !data.ok) {
                    throw new Error(data.message || 'Erro ao buscar módulos.');
                }

                const modules = Array.isArray(data.modules) ? data.modules : [];

                const ordemFrente = { A: 1, B: 2, C: 3 };

                modules.sort((a, b) => {
                    const frenteA = String(a.code || '').trim().charAt(0).toUpperCase();
                    const frenteB = String(b.code || '').trim().charAt(0).toUpperCase();

                    const pesoA = ordemFrente[frenteA] || 99;
                    const pesoB = ordemFrente[frenteB] || 99;

                    if (pesoA !== pesoB) return pesoA - pesoB;

                    return String(a.code || '').localeCompare(String(b.code || ''), 'pt-BR', { numeric: true });
                });

                modules.forEach((mod) => {
                    const option = document.createElement('option');
                    option.value = mod.id;
                    option.dataset.code = mod.code || '';
                    option.dataset.title = mod.title || '';
                    option.textContent = `${mod.code || ''} - ${mod.title || ''}`.trim();
                    moduleSelect.appendChild(option);
                });

                moduleSelect.disabled = false;
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        }

        function renderModuloSelecionado() {
            if (!selectedModules.length) {
                tagsContainer.innerHTML = '';
                document.getElementById('view-modulos-list').innerHTML = 'Nenhum módulo selecionado.';
                return;
            }

            tagsContainer.innerHTML = selectedModules.map((mod, index) => `
                <div class="modulo-tag">
                    ${mod.label}
                    <span onclick="removerModuloSelecionado(${index})">×</span>
                </div>
            `).join('');

            document.getElementById('view-modulos-list').innerHTML = selectedModules
                .map((mod) => `<span class="tag-mod">${mod.label}</span>`)
                .join('');
        }

        function removerModuloSelecionado(index) {
            selectedModules.splice(index, 1);
            renderModuloSelecionado();
        }

        function selecionarModulo(moduleId) {
            if (!moduleId) return;

            if (selectedModules.length >= 3) {
                alert('Você pode selecionar no máximo 3 módulos.');
                moduleSelect.value = '';
                return;
            }

            const option = moduleSelect.options[moduleSelect.selectedIndex];
            const jaExiste = selectedModules.some((mod) => mod.id === moduleId);

            if (jaExiste) {
                moduleSelect.value = '';
                return;
            }

            selectedModules.push({
                id: moduleId,
                code: option.dataset.code || '',
                title: option.dataset.title || option.textContent,
                label: option.textContent
            });

            moduleSelect.value = '';
            renderModuloSelecionado();
        }

        async function selecionarMateriaAluno(subjectId) {
            selectedSubject = (availableSubjects || []).find((item) => item.id === subjectId) || null;

            document.getElementById('view-materia-wait').innerText = selectedSubject?.name || 'Disciplina';
            document.getElementById('reg-materia-nome').innerText =
                (selectedMonitor?.subjects || []).map(s => s.name).join(' • ') || 'Selecione a matéria';

            await carregarModulos(subjectId);
        }

        function abrirRegistro(monitoriaId, nomeMonitor, materia) {
            if (!monitoriaId) {
                alert("Monitoria não identificada.");
                return;
            }

            const monitor = (ultimoEstadoGeral.monitores || []).find(
                (m) => m?.sessaoAtiva?.monitoriaId === monitoriaId
            );

            const subjectsDoMonitor = Array.isArray(monitor?.subjects) ? monitor.subjects : [];

            console.log('subjectsDoMonitor:', subjectsDoMonitor);

            monitorSelecionadoUsuario = monitoriaId;
            selectedMonitor = {
                monitoriaId,
                nome: nomeMonitor || 'Monitor',
                subjects: subjectsDoMonitor
            };

            const nomesMaterias = subjectsDoMonitor.length
                ? subjectsDoMonitor.map(s => s.name).join(' • ')
                : 'Selecione a matéria';

            document.getElementById('reg-monitor-nome').textContent = nomeMonitor || 'Monitor';
            document.getElementById('reg-materia-nome').textContent = nomesMaterias;
            document.getElementById('view-monitor-wait').innerText = nomeMonitor || 'Monitor';
            document.getElementById('view-materia-wait').innerText = nomesMaterias;

            preencherMateriasDoMonitor(subjectsDoMonitor);

            document.getElementById('overlay-registro').style.display = 'flex';
        }

        function fecharRegistro() {
            document.getElementById('overlay-registro').style.display = 'none';
            document.getElementById('tel-aluno').value = '';
            subjectSelect.value = '';
            moduleSelect.value = '';
            moduleSelect.disabled = true;
            moduleSelect.innerHTML = '<option value="">Selecione um módulo...</option>';
            selectedSubject = null;
            selectedModules = [];
            selectedMonitor = null;
            monitorSelecionadoUsuario = null;
            renderModuloSelecionado();
        }

        async function confirmarEntrada() {
            const telefoneDigitado = document.getElementById('tel-aluno').value.trim();
            const digits = telefoneDigitado.replace(/\D/g, '');

            if (digits.length < 10) {
                alert('Insira um WhatsApp válido.');
                return;
            }

            if (!selectedMonitor?.monitoriaId) {
                alert('Nenhuma monitoria selecionada.');
                return;
            }

            if (!selectedSubject?.id) {
                alert('Selecione a matéria desejada.');
                return;
            }

            studentId = digits;
            localStorage.setItem('student_id', studentId);

            try {
                const resp = await fetch(`${API_BASE}/queue/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        institutionId,
                        monitoriaId: selectedMonitor.monitoriaId,
                        studentId,
                        subjectId: selectedSubject?.id || null,
                        moduleIds: selectedModules.map(mod => mod.id)
                    })
                });

                const data = await resp.json();

                if (!resp.ok || !data.success) {
                    throw new Error(data.message || 'Erro ao entrar na fila.');
                }

                selectedEntryId = data.entry?.id || null;
                localStorage.setItem('selected_modules_labels', JSON.stringify(selectedModules.map(mod => mod.label)));
                document.getElementById('overlay-registro').style.display = 'none';
                document.getElementById('overlay-espera').style.display = 'flex';
                document.getElementById('view-status-msg').innerText = 'Você entrou na fila.';
                renderModuloSelecionado();

                if (socket) socket.emit('fila:atualizar');
            } catch (error) {
                console.error(error);
                alert(error.message || 'Erro ao entrar na fila.');
            }
        }

        function atualizarPainelEsperaTempo() {
            const fila = ultimoEstadoGeral?.fila || [];
            const agora = agoraServidor();
            const boxEspera = document.getElementById('box-espera');
            const boxChegada = document.getElementById('box-chegada');
            const boxAtendimento = document.getElementById('box-atendimento');
            const tempoEspera = document.getElementById('view-tempo-espera');
            const tempoChegada = document.getElementById('view-chegada-countdown');
            const tempoAtendimento = document.getElementById('view-atendimento-tempo');
            const statusMsg = document.getElementById('view-status-msg');
            const posicao = document.getElementById('view-posicao');

            boxEspera.style.display = 'none';
            boxChegada.style.display = 'none';
            boxAtendimento.style.display = 'none';

            if (!studentId || !selectedMonitor?.monitoriaId) {
                posicao.innerText = '--';
                return;
            }

            const filaMonitor = fila.filter((item) => item.monitoria?.id === selectedMonitor.monitoriaId);
            const minhaEntrada = filaMonitor.find((item) => item.id === selectedEntryId);

            if (!minhaEntrada) {
                posicao.innerText = '--';
                tempoEspera.innerText = '00:00';
                tempoChegada.innerText = '00:00';
                tempoAtendimento.innerText = '00:00';
                return;
            }

            selectedEntryId = minhaEntrada.id;
            document.getElementById('view-monitor-wait').innerText = selectedMonitor.nome || 'Monitor';
            document.getElementById('view-materia-wait').innerText = minhaEntrada.subject?.name || selectedSubject?.name || 'Disciplina';
            
            const modulosSalvos = (() => {
                try {
                    return JSON.parse(localStorage.getItem('selected_modules_labels') || '[]');
                } catch {
                    return [];
                }
            })();

            if (Array.isArray(modulosSalvos) && modulosSalvos.length) {
                document.getElementById('view-modulos-list').innerHTML = modulosSalvos
                    .map(label => `<span class="tag-mod">${label}</span>`)
                    .join('');
            } else if (minhaEntrada.module) {
                document.getElementById('view-modulos-list').innerHTML =
                    `<span class="tag-mod">${[minhaEntrada.module.code, minhaEntrada.module.title].filter(Boolean).join(' - ')}</span>`;
            } else {
                document.getElementById('view-modulos-list').innerHTML = 'Nenhum módulo selecionado.';
            }

            if (minhaEntrada.status === 'WAITING') {
                const somenteEsperando = filaMonitor.filter((item) => item.status === 'WAITING');
                const index = somenteEsperando.findIndex((item) => item.id === minhaEntrada.id);
                posicao.innerText = index >= 0 ? `${index + 1}º` : '--';
                tempoEspera.innerText = formatarHHMMSS(agora - new Date(minhaEntrada.createdAt).getTime());
                statusMsg.innerText = 'Você está aguardando na fila.';
                boxEspera.style.display = 'flex';
                return;
            }

            if (minhaEntrada.status === 'CALLED') {
                const limite = new Date(minhaEntrada.calledAt).getTime() + 2 * 60 * 1000;
                posicao.innerText = 'Sua vez!';
                tempoChegada.innerText = formatarMMSS(limite - agora);
                statusMsg.innerText = 'O monitor te chamou. Vá para a sala em até 2 minutos.';
                boxChegada.style.display = 'flex';
                return;
            }

            if (minhaEntrada.status === 'IN_SERVICE') {
                const inicio = minhaEntrada.startedAt ? new Date(minhaEntrada.startedAt).getTime() : agora;
                posicao.innerText = 'Em atendimento';
                tempoAtendimento.innerText = formatarHHMMSS(agora - inicio);
                statusMsg.innerText = 'Seu atendimento começou.';
                boxAtendimento.style.display = 'flex';
                return;
            }
        }

        function renderMonitores(data) {
            const grid = document.getElementById('grid-monitorias');
            if (!grid) return;

            const monitores = Array.isArray(data?.monitores) ? data.monitores : [];
            const fila = Array.isArray(data?.fila) ? data.fila : [];

            const monitoresOnline = monitores.filter((monitor) => {
                return monitor?.isOnline && monitor?.sessaoAtiva?.monitoriaId;
            });

            if (!monitoresOnline.length) {
                grid.innerHTML = `
                    <p style="color: var(--accent); grid-column: 1/-1; text-align: center;">
                        Nenhum monitor online no momento.
                    </p>
                `;
                return;
            }

            grid.innerHTML = monitoresOnline.map((monitor) => {
                const monitoriaId = monitor.sessaoAtiva.monitoriaId;

                const materiasDoMonitor = Array.isArray(monitor.subjects) && monitor.subjects.length
                    ? monitor.subjects.map(s => s.name).join(' • ')
                    : 'Matéria não informada';

                const qtdFila = fila.filter(
                    (item) => item?.monitoria?.id === monitoriaId && item.status === 'WAITING'
                ).length;

                const emAtendimento = fila.some(
                    (item) => item?.monitoria?.id === monitoriaId && item.status === 'IN_SERVICE'
                );

                const statusClasse = emAtendimento ? 'dot-atendimento pulse-dot' : 'dot-online';
                const statusTexto = emAtendimento ? 'Atendimento em andamento' : 'Disponível';

                return `
                    <div class="card" onclick="abrirRegistro('${monitoriaId}', '${String(monitor.name || 'Monitor').replace(/'/g, "\\'")}')">
                        <div class="status-top">
                            <span class="status-dot ${statusClasse}"></span>
                            <span class="status-tooltip">${statusTexto}</span>
                        </div>

                        <span class="monitor-nome">${monitor.name || 'Monitor'}</span>
                        <span class="materia-subtitulo">${materiasDoMonitor}</span>

                        <div class="divider"></div>

                        <div class="footer-content">
                            <span class="fila-texto">Na fila: ${qtdFila}</span>
                            <span class="tempo-texto">Clique para entrar</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function preencherMateriasDoMonitor(subjectsDoMonitor) {
            availableSubjects = Array.isArray(subjectsDoMonitor) ? subjectsDoMonitor : [];
            subjectSelect.innerHTML = '<option value="">Selecione a matéria...</option>';

            subjectsDoMonitor.forEach((subject) => {
                const option = document.createElement('option');
                option.value = subject.id;
                option.textContent = subject.name;
                subjectSelect.appendChild(option);
            });

            console.log('options no select:', subjectSelect.innerHTML);

            if (subjectsDoMonitor.length === 1) {
                subjectSelect.value = subjectsDoMonitor[0].id;
                selecionarMateriaAluno(subjectsDoMonitor[0].id);
            } else {
                selectedSubject = null;
                selectedModules = [];
                renderModuloSelecionado();
                moduleSelect.innerHTML = '<option value="">Selecione um módulo...</option>';
                moduleSelect.disabled = true;
            }
        }

        async function desistirFila() {
            if (!selectedEntryId) {
                document.getElementById('overlay-espera').style.display = 'none';
                return;
            }

            try {
                cancelamentoEmAndamento = true;

                const resp = await fetch(`${API_BASE}/queue/${selectedEntryId}/cancel`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await resp.json();

                if (!resp.ok || !data.success) {
                    cancelamentoEmAndamento = false;
                    throw new Error(data.message || 'Erro ao sair da fila.');
                }

                document.getElementById('overlay-espera').style.display = 'none';
                document.getElementById('overlay-feedback').style.display = 'none';
                document.getElementById('view-posicao').innerText = '--';
                document.getElementById('view-status-msg').innerText = '';
                document.getElementById('view-tempo-espera').innerText = '00:00';
                document.getElementById('view-chegada-countdown').innerText = '00:00';
                document.getElementById('view-atendimento-tempo').innerText = '00:00';
                document.getElementById('view-modulos-list').innerHTML = 'Nenhum módulo selecionado.';

                selectedEntryId = null;
                feedbackEntryId = null;
                selectedModules = [];
                localStorage.removeItem('selected_modules_labels');

                if (socket) socket.emit('fila:atualizar');

                setTimeout(() => {
                    cancelamentoEmAndamento = false;
                }, 1000);
            } catch (error) {
                cancelamentoEmAndamento = false;
                console.error(error);
                alert(error.message || 'Erro ao sair da fila.');
            }
        }

        function selecionarNota(valor, elemento) {
            notaGlobal = valor;
            document.querySelectorAll('.btn-nota').forEach((btn) => btn.classList.remove('selected'));
            elemento.classList.add('selected');
        }

        async function enviarFB() {
            if (notaGlobal === 0) {
                alert('Por favor, escolha uma nota.');
                return;
            }

            if (!feedbackEntryId) {
                alert('Nenhum atendimento encontrado para avaliar.');
                return;
            }

            const comentario = document.getElementById('comentario-feedback').value.trim();

            try {
                const resp = await fetch(`${API_BASE}/queue/${feedbackEntryId}/feedback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nota: notaGlobal,
                        comentario: comentario
                    })
                });

                const data = await resp.json();

                if (!resp.ok || !data.success) {
                    throw new Error(data.message || 'Erro ao enviar avaliação.');
                }

                document.getElementById('overlay-feedback').style.display = 'none';
                document.getElementById('comentario-feedback').value = '';
                document.querySelectorAll('.btn-nota').forEach((btn) => btn.classList.remove('selected'));
                notaGlobal = 0;
                selectedEntryId = null;
                feedbackEntryId = null;
                localStorage.removeItem('selected_modules_labels');

                alert('Avaliação enviada com sucesso.');
                location.reload();
            } catch (error) {
                console.error(error);
                alert(error.message || 'Erro ao enviar avaliação.');
            }
        }

        socket.on('dados-iniciais', (data) => {
            console.log('DADOS RECEBIDOS NO ALUNO:', data);

            ultimoEstadoGeral = {
                monitores: data?.monitores || [],
                fila: data?.fila || [],
                serverTime: Date.now()
            };

            atualizarOffsetServidor(Date.now());
            renderMonitores(data);
            atualizarPainelEsperaTempo();

            const minhaEntrada = (data.fila || []).find(
                (item) => item.id === selectedEntryId
            );

            if (minhaEntrada && document.getElementById('overlay-espera').style.display !== 'flex') {
                document.getElementById('overlay-espera').style.display = 'flex';
            }

            if (!minhaEntrada && document.getElementById('overlay-espera').style.display === 'flex' && selectedEntryId) {
                if (cancelamentoEmAndamento) {
                    document.getElementById('overlay-espera').style.display = 'none';
                    document.getElementById('overlay-feedback').style.display = 'none';
                    selectedEntryId = null;
                    feedbackEntryId = null;
                    return;
                }

                feedbackEntryId = selectedEntryId;
                document.getElementById('overlay-espera').style.display = 'none';
                document.getElementById('overlay-feedback').style.display = 'flex';
                selectedEntryId = null;
            }
        });

        socket.on('erro', (payload) => {
            if (payload?.message) {
                console.error(payload.message);
            }
        });

        setInterval(atualizarPainelEsperaTempo, 1000);
    </script>
</body>
</html>
