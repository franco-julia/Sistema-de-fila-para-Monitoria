<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versa | Painel de Chamada</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tv.css">
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center; gap: 20px;">
            <h1>VERSA MONITORIA</h1>
        </div>
        <div class="clock" id="relogio">00:00:00</div>
    </div>

    <div class="tv-grid" id="tv-grid">
        </div>

    <audio id="som-chamada" preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const institutionId = params.get('institution') || localStorage.getItem('institution_id') || null;
        const monitorId = params.get('monitor') || localStorage.getItem('monitor_id') || null;
        const monitoriaId = params.get('monitoria') || localStorage.getItem('monitoria_id') || null;
        const role = localStorage.getItem('user_role') || 'MONITOR';
        const API_BASE = "https://sistema-de-fila-para-monitoria-production.up.railway.app";

        const socket = io(API_BASE, {
            auth: {
                institutionId,
                userId: monitorId,
                role,
                monitoriaId
            }
        });
        let statusAnterior = {};
        let ultimoEstadoGeral = null;
        let serverOffsetMs = 0;
        let configTempos = {
            tempoChegadaMs: 2 * 60 * 1000,
            tempoAtendimentoMs: 15 * 60 * 1000,
            tempoExtraMs: 5 * 60 * 1000
        };


        function normalizarEstadoServidor(payload) {
            const base = payload || {};
            const monitores = Array.isArray(base.monitores) ? base.monitores : [];
            const fila = Array.isArray(base.fila) ? base.fila : [];
            const dados = {};

            monitores.forEach((monitor) => {
                const monitoriaAtualId = monitor?.sessaoAtiva?.monitoriaId || null;
                const filaMonitoria = monitoriaAtualId
                    ? fila.filter(item => item.monitoriaId === monitoriaAtualId)
                    : [];
                const atualBruto = filaMonitoria.find(item => item.status === 'IN_SERVICE')
                    || filaMonitoria.find(item => item.status === 'CALLED')
                    || null;
                const filaEspera = filaMonitoria.filter(item => item.status === 'WAITING');
                const tituloMonitoria = filaMonitoria.find(item => item?.monitoria?.title)?.monitoria?.title || 'Monitoria';

                dados[monitor.id] = {
                    id: monitor.id,
                    nome: monitor.name || 'Monitor',
                    materias: [tituloMonitoria],
                    status: monitor.isOnline ? 'disponível' : 'offline',
                    fila: filaEspera.map(item => ({
                        id: item.id,
                        nome: item?.student?.name || 'Aluno',
                        telefone: item?.student?.id || '',
                        materia: item?.monitoria?.title || tituloMonitoria,
                        modulos: [],
                        inicioFila: item?.createdAt ? new Date(item.createdAt).getTime() : null
                    })),
                    atual: atualBruto ? {
                        id: atualBruto.id,
                        nome: atualBruto?.student?.name || 'Aluno',
                        telefone: atualBruto?.student?.id || '',
                        materia: atualBruto?.monitoria?.title || tituloMonitoria,
                        modulos: [],
                        status: atualBruto.status === 'IN_SERVICE' ? 'em_atendimento' : 'chamado',
                        chegadaLimiteEm: atualBruto.calledAt ? new Date(atualBruto.calledAt).getTime() + 2 * 60 * 1000 : null,
                        atendimentoInicioEm: atualBruto.startedAt ? new Date(atualBruto.startedAt).getTime() : null,
                        atendimentoLimiteEm: atualBruto.startedAt ? new Date(atualBruto.startedAt).getTime() + 15 * 60 * 1000 : null,
                        extraLiberado: false
                    } : null,
                    sessaoAtiva: monitor.sessaoAtiva || null
                };
            });

            return {
                dados,
                historico: [],
                serverTime: Date.now(),
                config: {
                    tempoChegadaMs: 2 * 60 * 1000,
                    tempoAtendimentoMs: 15 * 60 * 1000,
                    tempoExtraMs: 5 * 60 * 1000
                }
            };
        }


        function atualizarOffsetServidor(serverTime) {
            if (typeof serverTime === 'number') {
                serverOffsetMs = Date.now() - serverTime;
            }
        }

        function agoraServidor() {
            return Date.now() - serverOffsetMs;
        }

        function formatarMMSS(ms) {
            const totalSeg = Math.max(0, Math.floor(ms / 1000));
            const min = Math.floor(totalSeg / 60).toString().padStart(2, '0');
            const seg = (totalSeg % 60).toString().padStart(2, '0');
            return `${min}:${seg}`;
        }

        function renderTV() {
            const grid = document.getElementById('tv-grid');
            const monitoriasAtivas = Object.entries((ultimoEstadoGeral && ultimoEstadoGeral.dados) || {}).filter(([, info]) => info.status !== 'offline');

            if (monitoriasAtivas.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align:center; color: var(--accent); font-size:1.4rem; padding:40px;">
                        Nenhuma monitoria ativa no momento.
                    </div>
                `;
                return;
            }

            grid.innerHTML = monitoriasAtivas.map(([usuario, info]) => {
                const emPausa = info.status === "em pausa";
                const temAlguem = info.atual !== null;
                const nomeMonitor = info.nome || "Monitor";
                const materias = Array.isArray(info.materias) ? info.materias.join(' • ') : 'Monitoria';
                const agora = agoraServidor();

                if (temAlguem && statusAnterior[usuario] !== info.atual.nome) {
                    tocarSom();
                    statusAnterior[usuario] = info.atual.nome;
                } else if (!temAlguem) {
                    statusAnterior[usuario] = null;
                }

                let timerHTML = '';
                let statusHTML = '';

                if (info.atual) {
                    if (info.atual.status === 'em_atendimento') {
                        const restanteAtendimento = (info.atual.atendimentoLimiteEm || agora) - agora;
                        timerHTML = `<span class="timer-tv">${formatarMMSS(restanteAtendimento)}</span>`;
                        statusHTML = '<small class="status-tv">ATENDIMENTO</small>';
                    } else if (info.atual.status === 'chamado') {
                        const restanteChegada = (info.atual.chegadaLimiteEm || 0) - agora;
                        timerHTML = `<span class="timer-tv destaque">${formatarMMSS(restanteChegada)}</span>`;
                        statusHTML = '<small class="status-tv">CHEGADA À SALA</small>';
                    }
                }
                return `
                    <div class="materia-card ${temAlguem && !emPausa ? 'chamando' : ''}">
                        <div class="monitor-tag">${nomeMonitor}</div>
                        <div class="materia-nome-tv">${materias}</div>

                        ${
                            emPausa
                            ? `<div class="pausa-label" style="background:#f8cc2d; color:#ffffff; padding:20px; border-radius:10px; font-weight:800; font-size:1.5rem;">
                                    MONITORIA EM PAUSA
                            </div>`
                            : `<div class="aluno-atual-box">
                                    <small style="color: var(--accent); font-weight: 700; font-size: 1.5rem;">ATENDENDO AGORA:</small>
                                    ${statusHTML}
                                    <div class="aluno-linha-tv">
                                        <div class="aluno-atual-nome">${info.atual ? info.atual.nome : 'LIVRE'}</div>
                                        ${timerHTML}
                                    </div>
                            </div>
                            <div class="proximo-aluno" style="margin-top:15px; font-size:1.2rem; color:#475569; font-weight:600;">
                                    <span style="color:#6035a9;">PRÓXIMO:</span> ${info.fila && info.fila.length > 0 ? info.fila[0].nome : '---'}
                            </div>`
                        }
                    </div>
                `;
            }).join('');
        }

        setInterval(() => {
            const agora = new Date();
            document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
            renderTV();
        }, 1000);

        socket.on('dados-iniciais', (payload) => {
            const data = normalizarEstadoServidor(payload);
            ultimoEstadoGeral = data;
            atualizarOffsetServidor(data.serverTime);
            configTempos = data.config || configTempos;
            renderTV();
        });

        function tocarSom() {
            const audio = document.getElementById('som-chamada');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(err => console.log("Interação necessária para som:", err));
            }
        }
    </script>
</body>
</html>
