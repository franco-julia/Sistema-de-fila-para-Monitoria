<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versa | Dashboard do Monitor</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="monitor.css">
    <style>
        .filtros-monitor { display:flex; gap:10px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
        .filtros-monitor select { padding:10px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.25); min-width:220px; }
        .oculto { display:none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="color: white; margin-bottom: 5px;">VERSA</h1>
            <p style="color: white; opacity: 0.8; margin-bottom: 20px;">Acesso Monitor</p>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-acao btn-proximo" style="width: 100%; margin-top: 10px;" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div id="dashboard" style="display: none;">
        <div class="sidebar">
            <div class="fila-header">
                <h2 style="margin:0;">Fila de Espera</h2>
                <span id="contador-fila" class="badge-count">0</span>
            </div>
            <div id="lista-espera" class="lista-alunos"></div>
        </div>

        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h1 id="nome-monitor-display" style="color: var(--accent); margin:0;">Monitor</h1>
                    <small id="materias-monitor-display" style="color: var(--card); font-size: 1.2rem; font-weight: 600;"></small>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="btn-status" class="btn-acao btn-pausa" onclick="alternarPausa()">PAUSAR MONITORIA</button>
                    <button class="btn-acao" style="background: #64748b; color:white;" onclick="location.reload()">SAIR</button>
                </div>
            </div>

            <div class="atendimento-card" id="card-atendimento">
                <div class="atendimento-info">
                    <small class="atendimento-label" id="fase-atendimento-label">ATENDENDO AGORA:</small>
                    <h2 id="aluno-atual-nome">Livre</h2>
                    <p id="aluno-atual-detalhes"></p>
                    <div class="timer-stack">
                        <div class="timer-pill" id="timer-chegada-wrap" style="display:none;">
                            <span>Chegada</span>
                            <strong id="timer-chegada">02:00</strong>
                        </div>
                        <div class="timer-pill" id="timer-atendimento-wrap" style="display:none;">
                            <span>Atendimento</span>
                            <strong id="timer-atendimento">00:00</strong>
                        </div>
                    </div>
                    <div class="alerta-tempo" id="alerta-mais-cinco" style="display:none;">Faltam 5 minutos. Deseja liberar +5 min?</div>
                </div>

                <div class="modulos-box">
                    <small class="modulos-titulo">Módulos selecionados</small>
                    <div id="modulos-atual" class="modulos-lista">Nenhum módulo selecionado.</div>
                </div>

                <div class="acoes-atendimento">
                    <button class="btn-acao btn-proximo" id="btn-confirmar-chegada" style="display:none;" onclick="confirmarChegada()">CONFIRMAR CHEGADA</button>
                    <button class="btn-acao btn-extra" id="btn-extra" style="display:none;" onclick="adicionarMaisCinco()">+5 MIN</button>
                    <button class="btn-acao btn-proximo" id="btn-proximo" onclick="chamarProximo()">CHAMAR PRÓXIMO ➔</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="chart-container chart-grande" id="card-chart-materias">
                    <div class="filtros-monitor">
                        <h3 style="color: #ffffff; margin: 0;" id="titulo-chart-monitor">Módulos mais pedidos</h3>
                        <select id="filtro-materia-monitor" onchange="atualizarEstatisticas((ultimoEstadoGeral && ultimoEstadoGeral.historico) || [])"></select>
                    </div>
                    <canvas id="chartMateriasMonitor"></canvas>
                </div>

                <div class="chart-container chart-pequeno total-card">
                    <h3 style="color: #ffffff;">Total de Atendimentos</h3>
                    <div id="total-atendimentos" class="total-numero">0</div>
                    <p style="color: #ffffff;">nesta sessão</p>
                </div>

                <div class="chart-container chart-pequeno">
                    <h3 style="color: #ffffff; margin-bottom: 15px;">Horários de Pico</h3>
                    <canvas id="chartHorariosPico"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io('http://localhost:5005', {
            auth: {
                institutionId: dadosLogin.institutionId,
                userId: dadosLogin.monitorId,
                role: 'MONITOR',
                monitoriaId: monitoriaIdSelecionada
            }
        });
        console.log('socket monitor criado');

        socket.on('connect', () => {
            console.log('monitor conectado ao socket:', socket.id);
        });

        socket.on('connect_error', (err) => {
            console.error('erro ao conectar socket do monitor:', err);
        });

        let minhaMateria = [];
        let nomeMonitor = "";
        let monitorLogado = null;
        let statusLocal = "disponível";
        let chartMaterias = null;
        let chartHorariosPico = null;
        let ultimoEstadoGeral = null;
        let serverOffsetMs = 0;
        let configTempos = {
            tempoChegadaMs: 2 * 60 * 1000,
            tempoAtendimentoMs: 15 * 60 * 1000,
            tempoExtraMs: 5 * 60 * 1000
        };

        Chart.defaults.color = '#ffffff';
        Chart.defaults.borderColor = '#ffffff';

        const params = new URLSearchParams(window.location.search);
        const institutionId = params.get('institution');

        socket.emit('joinInstitution', { institutionId });

        function agoraServidor() {
            return Date.now() - serverOffsetMs;
        }

        function atualizarOffsetServidor(serverTime) {
            if (typeof serverTime === 'number') {
                serverOffsetMs = Date.now() - serverTime;
            }
        }

        function login() {
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value.trim();
            localStorage.setItem('auth_token', data.token);
            localStorage.setItem('monitor_username', data.usuario);

            if (!user || !pass) {
                alert("Preencha os campos.");
                return;
            }

            fetch('/login-monitor', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: user, senha: pass })
            })
            .then(res => res.json())
            .then(data => {
            console.log('resposta do login HTTP:', data);

            if (!data.success) {
                alert("Dados de acesso incorretos.");
                return;
            }

            monitorLogado = user;
            nomeMonitor = data.nome;
            minhaMateria = Array.isArray(data.materia) ? data.materia : [data.materia].filter(Boolean);

            console.log('vou emitir loginMonitor com usuário:', user);
            socket.emit('loginMonitor', {
                token: localStorage.getItem('auth_token')
            });

            socket.on('loginMonitor', async (identificacao) => {
                try {
                    const monitor = await prisma.monitor.findFirst({
                        where: {
                            institutionId: INSTITUTION_ID,
                            username: identificacao.usuario
                        },
                        include: {
                            subjects: true
                        }
                    });

                    if (!monitor) {
                        socket.emit('loginErro', 'Monitor não encontrado.');
                        return;
                    }

                    socket.emit('loginSucesso', {
                        monitor: {
                            id: monitor.id,
                            nome: monitor.name,
                            materias: monitor.subjects.map(s => s.subject),
                            status: monitor.status === 'PAUSED' ? 'em pausa' : 'disponível',
                            fila: [],
                            atual: null
                        },
                        usuario: monitor.username
                    });

                    await atualizarTodos();
                } catch (error) {
                    console.error('Erro no loginMonitor:', error);
                    socket.emit('loginErro', 'Erro ao carregar monitor.');
                }
            });

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            document.getElementById('materias-monitor-display').innerText = minhaMateria.join(', ');
            document.getElementById('nome-monitor-display').innerText = nomeMonitor;

            inicializarGraficos();
            preencherFiltroMateria();
        })
        .catch(() => alert("Erro ao fazer login."));
        }

        function preencherFiltroMateria() {
            const select = document.getElementById('filtro-materia-monitor');
            const titulo = document.getElementById('titulo-chart-monitor');
            if (!select || !titulo) return;

            const materias = Array.isArray(minhaMateria) ? minhaMateria : [];
            select.innerHTML = '<option value="__todas__">Todas as matérias</option>';

            materias.forEach(m => {
                const option = document.createElement('option');
                option.value = m;
                option.textContent = m;
                select.appendChild(option);
            });

            if (materias.length <= 1) {
                titulo.innerText = 'Módulos mais pedidos';
                select.style.display = 'none';
                select.value = '__todas__';
            } else {
                titulo.innerText = 'Volume de matérias';
                select.style.display = 'none';
                select.value = '__todas__';
            }
        }

        function chamarProximo() {
            if (!monitorLogado) return alert("Sessão expirada. Faça login novamente.");
            socket.emit('proximo', { usuario: monitorLogado, monitor: nomeMonitor });
        }

        function confirmarChegada() {
            if (monitorLogado) socket.emit('confirmarChegada', { usuario: monitorLogado });
        }

        function adicionarMaisCinco() {
            if (monitorLogado) socket.emit('addTempoExtra', { usuario: monitorLogado });
        }

        function alternarPausa() {
            if (!monitorLogado) return;
            statusLocal = statusLocal === "disponível" ? "em pausa" : "disponível";
            socket.emit('alternarPausa', { usuario: monitorLogado, status: statusLocal });
        }

        function inicializarGraficos() {
            const canvasMaterias = document.getElementById('chartMateriasMonitor');
            const canvasPico = document.getElementById('chartHorariosPico');

            if (canvasMaterias) {
                chartMaterias = new Chart(canvasMaterias.getContext('2d'), {
                    type: 'bar',
                    data: { labels: [], datasets: [{ label: 'Módulos', data: [], backgroundColor: '#6035a9', borderRadius: 6 }] },
                    options: {
                        scales: {
                            x: {
                                ticks: {
                                    font: { size: 11 },
                                    maxRotation: 0,
                                    minRotation: 0,
                                    callback: function(value) {
                                        const label = this.getLabelForValue(value);

                                        const palavras = label.split(' ');
                                        const linhas = [];
                                        let linhaAtual = '';

                                        palavras.forEach(palavra => {
                                        if ((linhaAtual + palavra).length > 12) {
                                            linhas.push(linhaAtual.trim());
                                            linhaAtual = palavra + ' ';
                                        } else {
                                            linhaAtual += palavra + ' ';
                                        }
                                        });

                                        if (linhaAtual) linhas.push(linhaAtual.trim());

                                        return linhas;
                                    }
                                }
                            }
                        }
                    }
                });
            }

            if (canvasPico) {
                chartHorariosPico = new Chart(canvasPico.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: 'Atendimentos por horário',
                            data: [],
                            borderColor: '#6035a9',
                            backgroundColor: 'rgba(96, 53, 169, 0.15)',
                            tension: 0.35,
                            fill: true,
                            pointBackgroundColor: '#6035a9'
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            }
        }

        function formatarMMSS(ms) {
            const totalSeg = Math.max(0, Math.floor(ms / 1000));
            const min = Math.floor(totalSeg / 60).toString().padStart(2, '0');
            const seg = (totalSeg % 60).toString().padStart(2, '0');
            return `${min}:${seg}`;
        }

        function formatarEspera(ms) {
            const totalSeg = Math.max(0, Math.floor(ms / 1000));
            const min = Math.floor(totalSeg / 60);
            const seg = (totalSeg % 60).toString().padStart(2, '0');
            return `${String(min).padStart(2, '0')}:${seg}`;
        }

        function atualizarRelogiosLocais() {
            if (!ultimoEstadoGeral || !monitorLogado) return;
            const monitor = (ultimoEstadoGeral.dados || {})[monitorLogado];
            if (!monitor) return;

            const atual = monitor.atual;
            const btnConfirmar = document.getElementById('btn-confirmar-chegada');
            const btnExtra = document.getElementById('btn-extra');
            const wrapChegada = document.getElementById('timer-chegada-wrap');
            const wrapAtendimento = document.getElementById('timer-atendimento-wrap');
            const timerChegada = document.getElementById('timer-chegada');
            const timerAtendimento = document.getElementById('timer-atendimento');
            const alerta = document.getElementById('alerta-mais-cinco');
            const detalhes = document.getElementById('aluno-atual-detalhes');
            const faseLabel = document.getElementById('fase-atendimento-label');
            const btnProximo = document.getElementById('btn-proximo');
            const agora = agoraServidor();

            wrapChegada.style.display = 'none';
            wrapAtendimento.style.display = 'none';
            btnConfirmar.style.display = 'none';
            btnExtra.style.display = 'none';
            alerta.style.display = 'none';

            if (!atual) {
                faseLabel.innerText = 'ATENDENDO AGORA:';
                btnProximo.innerText = 'CHAMAR PRÓXIMO ➔';
                timerChegada.innerText = '02:00';
                timerAtendimento.innerText = '00:00';
                if (!detalhes.innerText.includes('monitoria')) detalhes.innerText = '';
                return;
            }

            if (atual.status === 'chamado') {
                const restante = atual.chegadaLimiteEm ? (atual.chegadaLimiteEm - agora) : 0;
                faseLabel.innerText = 'ALUNO CHAMADO:';
                btnProximo.innerText = 'PULAR E CHAMAR PRÓXIMO ➔';
                btnConfirmar.style.display = 'inline-flex';
                wrapChegada.style.display = 'inline-flex';
                timerChegada.innerText = formatarMMSS(restante);
                detalhes.innerText = restante > 0 ? 'Aguardando o aluno chegar à sala.' : 'Tempo de chegada esgotado. O aluno voltará ao fim da fila.';
                return;
            }

            if (atual.status === 'em_atendimento') {
                const decorrido = atual.atendimentoInicioEm ? (agora - atual.atendimentoInicioEm) : 0;
                const restante = atual.atendimentoLimiteEm ? (atual.atendimentoLimiteEm - agora) : 0;
                faseLabel.innerText = 'ATENDENDO AGORA:';
                btnProximo.innerText = 'FINALIZAR E CHAMAR PRÓXIMO ➔';
                wrapAtendimento.style.display = 'inline-flex';
                timerAtendimento.innerText = formatarEspera(decorrido);
                detalhes.innerText = `Tempo restante: ${formatarMMSS(restante)}`;
                if (restante <= configTempos.tempoExtraMs) {
                    alerta.style.display = 'block';
                    if (!atual.extraLiberado) btnExtra.style.display = 'inline-flex';
                }
            }
        }

        socket.on('loginSucesso', (data) => {
            if (!data || !data.monitor) return;
            statusLocal = data.monitor.status || 'disponível';
            atualizarBotaoStatus(statusLocal);
        });

        socket.on('loginErro', (msg) => alert(msg || 'Erro ao entrar como monitor.'));
        socket.on('erroAcao', (msg) => alert(msg || 'Não foi possível concluir a ação.'));

        socket.on('alertaTempoFinal', (dados) => {
            if (dados.monitorUsuario === monitorLogado) {
                const alerta = document.getElementById('alerta-mais-cinco');
                if (alerta) alerta.style.display = 'block';
                if (dados.podeAdicionarMaisCinco) {
                    document.getElementById('btn-extra').style.display = 'inline-flex';
                }
            }
        });

        socket.on('atualizarGeral', (data) => {
            ultimoEstadoGeral = data;
            atualizarOffsetServidor(data.serverTime);
            configTempos = data.config || configTempos;
            if (!monitorLogado) return;

            const meuMonitor = (data.dados || {})[monitorLogado];
            if (!meuMonitor) return;

            const fila = meuMonitor.fila || [];
            document.getElementById('contador-fila').innerText = fila.length;
            document.getElementById('lista-espera').innerHTML = fila.length
                ? fila.map((aluno, index) => {
                    const modulos = Array.isArray(aluno.modulos) && aluno.modulos.length ? aluno.modulos.join(' • ') : 'Sem módulos informados';
                    return `
                        <div class="aluno-item ${index === 0 ? 'proximo-item' : ''}">
                            <b>${index === 0 ? 'Próximo: ' : ''}${aluno.nome || 'Aluno'}</b>
                            <small>${aluno.materia || ''}</small>
                            <small>${modulos}</small>
                        </div>`;
                }).join('')
                : '<div class="aluno-item"><b>Fila vazia</b><small>Nenhum aluno aguardando.</small></div>';

            statusLocal = meuMonitor.status || 'disponível';
            document.getElementById('nome-monitor-display').innerText = meuMonitor.nome || nomeMonitor;
            document.getElementById('materias-monitor-display').innerText = Array.isArray(meuMonitor.materias) ? meuMonitor.materias.join(', ') : '';
            atualizarBotaoStatus(statusLocal);

            const atual = meuMonitor.atual;
            const alunoNome = document.getElementById('aluno-atual-nome');
            const alunoDetalhes = document.getElementById('aluno-atual-detalhes');
            const modulosAtual = document.getElementById('modulos-atual');
            const btnProximo = document.getElementById('btn-proximo');
            const card = document.getElementById('card-atendimento');

            if (statusLocal === 'em pausa' && !atual) {
                alunoNome.innerText = 'EM PAUSA';
                alunoDetalhes.innerText = 'A monitoria está temporariamente indisponível.';
                modulosAtual.innerHTML = 'Nenhum atendimento em andamento.';
                btnProximo.disabled = true;
                card.classList.add('card-pausado');
            } else {
                btnProximo.disabled = false;
                card.classList.remove('card-pausado');
                if (atual) {
                    alunoNome.innerText = atual.nome || 'Aluno';
                    modulosAtual.innerHTML = Array.isArray(atual.modulos) && atual.modulos.length
                        ? atual.modulos.map(mod => `<span class="tag-modulo">${mod}</span>`).join('')
                        : 'Nenhum módulo selecionado.';
                } else {
                    alunoNome.innerText = 'Livre';
                    alunoDetalhes.innerText = fila.length ? `Próximo na fila: ${fila[0].nome}` : '';
                    modulosAtual.innerHTML = 'Aguardando próximo atendimento.';
                }
            }

            atualizarRelogiosLocais();
            atualizarEstatisticas(data.historico || []);
        });

        setInterval(atualizarRelogiosLocais, 1000);

        function atualizarBotaoStatus(status) {
            const btn = document.getElementById('btn-status');
            if (btn) btn.innerText = status === 'em pausa' ? 'RETOMAR MONITORIA' : 'PAUSAR MONITORIA';
        }

        function atualizarEstatisticas(historico) {
            const meusAtendimentos = (Array.isArray(historico) ? historico : []).filter(h => {
                return h && h.atendidoPor === nomeMonitor;
            });

            const totalAtendimentosEl = document.getElementById('total-atendimentos');
            if (totalAtendimentosEl) {
                totalAtendimentosEl.innerText = meusAtendimentos.length;
            }

            const filtroMateria = document.getElementById('filtro-materia-monitor')?.value || '__todas__';

            const baseFiltrada = filtroMateria === '__todas__'
                ? meusAtendimentos
                : meusAtendimentos.filter(h => h.materia === filtroMateria);

            const contagemModulos = {};
            const contagemMaterias = {};
            const contagemHorarios = {};

            baseFiltrada.forEach(h => {
                if (!h) return;

                const materia = (h.materia || 'Sem matéria').trim();
                contagemMaterias[materia] = (contagemMaterias[materia] || 0) + 1;

                const listaModulos = Array.isArray(h.modulos) && h.modulos.length
                    ? h.modulos
                    : (h.modulo ? [h.modulo] : []);

                if (listaModulos.length) {
                    listaModulos.forEach(mod => {
                        const nomeModulo = String(mod || 'Não informado').trim();
                        contagemModulos[nomeModulo] = (contagemModulos[nomeModulo] || 0) + 1;
                    });
                } else {
                    contagemModulos['Não informado'] = (contagemModulos['Não informado'] || 0) + 1;
                }

                if (h.inicio) {
                    const dataInicio = new Date(h.inicio);
                    if (!isNaN(dataInicio.getTime())) {
                        const hora = dataInicio.getHours().toString().padStart(2, '0') + ':00';
                        contagemHorarios[hora] = (contagemHorarios[hora] || 0) + 1;
                    }
                }
            });

            const topModulos = Object.entries(contagemModulos)
                .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
                .slice(0, 8);

            if (chartMaterias) {
                chartMaterias.data.labels = topModulos.map(([nome]) => nome);
                chartMaterias.data.datasets[0].data = topModulos.map(([, total]) => total);
                chartMaterias.data.datasets[0].label = 'Módulos mais pedidos';
                chartMaterias.update();
            }

            const tituloGrafico = document.querySelector('#card-chart-materias h3');
            if (tituloGrafico) {
                tituloGrafico.innerText = 'Módulos mais pedidos';
            }

            const horasOrdenadas = Object.keys(contagemHorarios).sort();

            if (chartHorariosPico) {
                chartHorariosPico.data.labels = horasOrdenadas;
                chartHorariosPico.data.datasets[0].data = horasOrdenadas.map(hora => contagemHorarios[hora]);
                chartHorariosPico.update();
            }

            const materiasDoMonitor = Array.isArray(minhaMateria) ? minhaMateria.filter(Boolean) : [];
            const ehMultidisciplinar = materiasDoMonitor.length > 1;

            const cardMaterias = document.getElementById('card-chart-materias');
            if (cardMaterias) {
                cardMaterias.classList.remove('oculto');
            }

            const selectFiltro = document.getElementById('filtro-materia-monitor');
            if (selectFiltro) {
                if (ehMultidisciplinar) {
                    selectFiltro.style.display = 'inline-block';
                } else {
                    selectFiltro.style.display = 'none';
                }
            }

            return {
                totalAtendimentos: meusAtendimentos.length,
                modulosMaisPedidos: topModulos,
                volumePorMateria: Object.entries(contagemMaterias).sort((a, b) => b[1] - a[1]),
                horariosDePico: horasOrdenadas.map(hora => ({
                    hora,
                    total: contagemHorarios[hora]
                }))
            };
        }
    </script>
</body>
</html>
